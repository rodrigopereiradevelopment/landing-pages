<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instituto Raiz — Obrigado!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --accent: #c4622d; --text: #2d1f14; --muted: #7a6050; --bg: #faf7f2; --warm: #f5ede0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 520px; animation: up 0.8s ease both; }
    @keyframes up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    .heart {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--warm); border: 1.5px solid #e8c8a8;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem; font-size: 1.8rem;
    }
    .tag { font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 0.8rem; }
    h1 { font-family: 'Lora', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 400; line-height: 1.15; margin-bottom: 1rem; }
    h1 em { font-style: italic; color: var(--accent); }
    p { color: var(--muted); font-size: 0.92rem; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block; padding: 0.85rem 2rem;
      background: var(--accent); color: #fff; text-decoration: none;
      font-size: 0.82rem; font-weight: 500; border-radius: 100px;
      transition: background 0.3s;
    }
    a:hover { background: #a84e22; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="heart">🤝</div>
    <span class="tag">Instituto Raiz</span>
    <h1>Sua mensagem<br />chegou com <em>carinho.</em></h1>
    <p>Obrigado pelo contato! Nossa equipe responderá em breve. Se quiser acompanhar nosso trabalho, siga-nos no Instagram.</p>
    <a href="index.html">Voltar ao início</a>
  </div>
</body>
</html>
