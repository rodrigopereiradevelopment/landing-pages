<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
 
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
const CX = () => W / 2;
const CY = () => H / 2;
 
const CHARS = "0123456789ABCDEFabcdef東西南北上下左右一二三四五六七八九十";
 
// Rings that form the tunnel
const RING_COUNT = 28;
const CHARS_PER_RING = 32;
 
// Color bands matching the image: cyan, blue, orange/red in center, green, purple edges
function getRingColor(ringIndex, totalRings, charIndex, totalChars, depth) {
  // depth 0 = far (center), 1 = close (edge)
  const d = ringIndex / totalRings; // 0=center, 1=edge
 
  // Angle-based color variation
  const angle = (charIndex / totalChars) * Math.PI * 2;
 
  // Center glow: bright orange/white
  if (d < 0.08) {
    return `rgba(255,220,120,${0.9 + Math.random()*0.1})`;
  }
  // Inner ring: orange-red
  if (d < 0.2) {
    const t = (d - 0.08) / 0.12;
    const r = 255;
    const g = Math.floor(180 - t * 100);
    const b = Math.floor(40 - t * 30);
    return `rgba(${r},${g},${b},${0.85})`;
  }
  // Mid-inner: mix of cyan and orange
  if (d < 0.4) {
    const t = (d - 0.2) / 0.2;
    // Alternate between cyan and orange by angle
    if (Math.sin(angle * 3) > 0.2) {
      return `rgba(0,${Math.floor(200+t*55)},${Math.floor(220+t*35)},${0.8})`;
    } else {
      return `rgba(${Math.floor(255-t*50)},${Math.floor(120+t*80)},0,${0.75})`;
    }
  }
  // Middle: predominantly cyan/teal
  if (d < 0.65) {
    const t = (d - 0.4) / 0.25;
    if (Math.cos(angle * 5) > 0.0) {
      return `rgba(0,${Math.floor(230-t*30)},${Math.floor(255-t*20)},${0.75 - t*0.1})`;
    } else {
      return `rgba(0,${Math.floor(180+t*30)},${Math.floor(200+t*30)},${0.7})`;
    }
  }
  // Outer: blue, purple, deep cyan
  if (d < 0.85) {
    const t = (d - 0.65) / 0.2;
    if (Math.sin(angle * 7 + 1) > 0) {
      return `rgba(${Math.floor(30+t*60)},${Math.floor(80+t*40)},${Math.floor(220+t*35)},${0.65-t*0.1})`;
    } else {
      return `rgba(0,${Math.floor(200-t*80)},${Math.floor(255-t*100)},${0.6})`;
    }
  }
  // Outermost edge: dark blue/teal fading
  return `rgba(0,${Math.floor(100-d*60)},${Math.floor(180-d*100)},${0.4-d*0.3})`;
}
 
// Particle system for the tunnel
class TunnelChar {
  constructor(ringIdx, charIdx) {
    this.ringIdx = ringIdx;
    this.charIdx = charIdx;
    this.totalRings = RING_COUNT;
    this.totalChars = CHARS_PER_RING;
    this.reset(ringIdx / RING_COUNT);
  }
 
  reset(zNorm) {
    this.z = zNorm; // 0=far center, 1=close camera
    this.char = CHARS[Math.floor(Math.random() * CHARS.length)];
    this.changeTimer = Math.random() * 60;
    // Add slight jitter to position on ring
    this.angleOffset = (Math.random() - 0.5) * 0.08;
    this.radiusJitter = (Math.random() - 0.5) * 0.06;
  }
 
  update() {
    // Move toward camera
    this.z += 0.003;
    if (this.z > 1.02) {
      this.z = 0.01 + Math.random() * 0.05;
      this.char = CHARS[Math.floor(Math.random() * CHARS.length)];
    }
    // Occasionally change character
    this.changeTimer--;
    if (this.changeTimer <= 0) {
      this.char = CHARS[Math.floor(Math.random() * CHARS.length)];
      this.changeTimer = 20 + Math.random() * 80;
    }
  }
 
  draw(cx, cy) {
    const z = this.z;
    if (z <= 0.001) return;
 
    const angle = (this.charIdx / this.totalChars) * Math.PI * 2 + this.angleOffset;
 
    // Perspective projection: rings expand as z increases
    // Use a tunnel shape: elliptical rings that expand outward
    const perspective = Math.pow(z, 1.6);
    const maxR = Math.min(W, H) * 0.52 * perspective;
    const rx = maxR * (1 + this.radiusJitter);
    const ry = maxR * 0.55 * (1 + this.radiusJitter * 0.5); // elliptical squash
 
    const px = cx + Math.cos(angle) * rx;
    const py = cy + Math.sin(angle) * ry;
 
    // Font size based on distance
    const fontSize = Math.max(8, 24 * perspective);
    // Opacity: fade in as they approach, bright in mid, fade at very edge
    let alpha = 1.0;
    if (z < 0.15) alpha = z / 0.15;
    else if (z > 0.85) alpha = (1 - z) / 0.15;
 
    const color = getRingColor(Math.floor(z * RING_COUNT), RING_COUNT, this.charIdx, this.totalChars, z);
    // Extract rgba components and apply alpha
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${fontSize}px "Courier New", monospace`;
    ctx.fillStyle = color;
 
    // Glow effect for bright chars
    if (z > 0.3 && z < 0.7) {
      ctx.shadowColor = color;
      ctx.shadowBlur = fontSize * 0.8;
    }
 
    ctx.fillText(this.char, px - fontSize * 0.3, py + fontSize * 0.35);
    ctx.restore();
  }
}
 
// Build all particles
let particles = [];
function buildParticles() {
  particles = [];
  for (let r = 0; r < RING_COUNT; r++) {
    for (let c = 0; c < CHARS_PER_RING; c++) {
      const p = new TunnelChar(r, c);
      // Stagger z so they're distributed in depth
      p.z = (r / RING_COUNT) + (Math.random() * 0.04 - 0.02);
      p.z = Math.max(0.01, Math.min(1.0, p.z));
      particles.push(p);
    }
  }
}
 
buildParticles();
 
// Add extra scattered chars for density
const extraChars = [];
for (let i = 0; i < 300; i++) {
  const p = new TunnelChar(
    Math.floor(Math.random() * RING_COUNT),
    Math.floor(Math.random() * CHARS_PER_RING)
  );
  p.z = Math.random();
  p.angleOffset = (Math.random() - 0.5) * 0.4;
  p.radiusJitter = (Math.random() - 0.5) * 0.25;
  extraChars.push(p);
}
 
// Radial glow layers for center light burst
function drawCenterGlow(cx, cy) {
  // Multiple radial gradients for the central light
  const gradients = [
    { r: Math.min(W,H)*0.12, colors: [[0,'rgba(255,240,180,0.95)'],[0.4,'rgba(255,160,40,0.6)'],[1,'rgba(255,80,0,0)']] },
    { r: Math.min(W,H)*0.22, colors: [[0,'rgba(255,200,80,0.4)'],[0.5,'rgba(255,120,0,0.2)'],[1,'rgba(0,0,0,0)']] },
    { r: Math.min(W,H)*0.06, colors: [[0,'rgba(255,255,240,1.0)'],[0.6,'rgba(255,220,120,0.8)'],[1,'rgba(255,150,0,0)']] },
  ];
  for (const g of gradients) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, g.r);
    for (const [stop, color] of g.colors) grad.addColorStop(stop, color);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}
 
// Tunnel walls: draw faint concentric ellipses for structure
function drawTunnelRings(cx, cy) {
  for (let i = 0; i < 18; i++) {
    const z = (i + 0.5) / 18;
    const perspective = Math.pow(z, 1.6);
    const rx = Math.min(W,H) * 0.52 * perspective;
    const ry = rx * 0.55;
    const alpha = 0.04 + perspective * 0.06;
    // Color matches depth
    const hue = 180 + (1-z) * 40;
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${hue},100%,60%,${alpha})`;
    ctx.lineWidth = 1 + perspective * 2;
    ctx.stroke();
  }
 
  // Radial lines (perspective lines along tunnel)
  const lineCount = 32;
  for (let i = 0; i < lineCount; i++) {
    const angle = (i / lineCount) * Math.PI * 2;
    const farRx = Math.min(W,H) * 0.52 * Math.pow(0.05, 1.6);
    const farRy = farRx * 0.55;
    const nearRx = Math.min(W,H) * 0.52;
    const nearRy = nearRx * 0.55;
    const x1 = cx + Math.cos(angle) * farRx;
    const y1 = cy + Math.sin(angle) * farRy;
    const x2 = cx + Math.cos(angle) * nearRx;
    const y2 = cy + Math.sin(angle) * nearRy;
    const hue = 190 + Math.cos(angle) * 30;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `hsla(${hue},90%,55%,0.04)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}
 
// Vignette overlay to darken edges
function drawVignette(cx, cy) {
  const grad = ctx.createRadialGradient(cx, cy, Math.min(W,H)*0.2, cx, cy, Math.max(W,H)*0.75);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(0,0,10,0.1)');
  grad.addColorStop(1, 'rgba(0,0,20,0.85)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}
 
// Orange/red streaks along the floor perspective
function drawFloorStreaks(cx, cy) {
  const floorY = cy + Math.min(W,H)*0.1;
  for (let i = 0; i < 8; i++) {
    const t = i / 7;
    const x = cx + (t - 0.5) * W * 0.8;
    const grad = ctx.createLinearGradient(cx, cy, x, floorY + Math.min(W,H)*0.3);
    grad.addColorStop(0, 'rgba(255,140,0,0.0)');
    grad.addColorStop(0.4, 'rgba(255,100,0,0.12)');
    grad.addColorStop(1, 'rgba(200,60,0,0.0)');
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, floorY + Math.min(W,H)*0.3);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}
 
let frame = 0;
function animate() {
  const cx = CX(), cy = CY();
 
  // Clear with slight trail
  ctx.fillStyle = 'rgba(0,0,8,0.45)';
  ctx.fillRect(0, 0, W, H);
 
  drawTunnelRings(cx, cy);
  drawFloorStreaks(cx, cy);
 
  // Sort particles by z (far to near) for correct layering
  const allParticles = [...particles, ...extraChars];
  allParticles.sort((a, b) => a.z - b.z);
 
  for (const p of allParticles) {
    p.update();
    p.draw(cx, cy);
  }
 
  drawCenterGlow(cx, cy);
  drawVignette(cx, cy);
 
  frame++;
  requestAnimationFrame(animate);
}
 
animate();
 
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildParticles();
});
</script>
</body>
</html>
